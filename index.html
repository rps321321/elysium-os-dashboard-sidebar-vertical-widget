<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysium Sidebar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap');
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { 
  width: 100vw;
  height: 100vh;
  margin: 0;
  padding: 0;
  background: #191919; 
  font-family: 'Outfit', sans-serif; 
  overflow: hidden;
  color: #f5f2ee;
  border: none !important;
  box-shadow: none !important;
}
.sidebar-pillar {
  display: flex;
  flex-direction: column;
  background: #191919;
  width: 100%;
  height: 100%;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  border: none !important;
  box-shadow: none !important;
}
.nav-item {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 18px 24px;
  text-decoration: none;
  transition: all 0.3s ease;
  position: relative;
  border-bottom: 1px solid rgba(255, 255, 255, 0.03);
}
.nav-item:last-child {
  border-bottom: none;
}
.nav-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 50%;
  transform: translateY(-50%);
  width: 3px;
  height: 0;
  background: #c9a84c;
  transition: height 0.3s ease;
  box-shadow: 0 0 10px #c9a84c;
}
.nav-item:hover {
  background: rgba(201, 168, 76, 0.05);
  padding-left: 30px;
}
.nav-item:hover::before {
  height: 60%;
}
.icon-box {
  color: #5a5a75;
  transition: color 0.3s ease, transform 0.3s ease;
  display: flex;
  align-items: center;
}
.nav-item:hover .icon-box {
  color: #c9a84c;
  transform: scale(1.1);
}
.label {
  font-size: 15px;
  font-weight: 400;
  letter-spacing: 0.03em;
  color: #f5f2ee;
  opacity: 0.8;
  transition: opacity 0.3s ease, color 0.3s ease;
}
.nav-item:hover .label {
  opacity: 1;
  color: #ffffff;
}
</style>
<script>
function handleNav(e, url) {
  // Detection for Notion Desktop App
  const isNotionApp = /Notion/i.test(navigator.userAgent);
  
  // If in a browser, try to navigate the same tab
  if (!isNotionApp) {
    try {
      if (window.top && window.top !== window) {
        window.top.location.href = url;
        e.preventDefault();
        return false;
      }
    } catch (err) {
      // Cross-origin browser security: target="_top" will take over
    }
  }
  
  // In the App: Let the native "target='_blank'" on the anchor tag handle it.
  // This is the most robust way as it mimics the "Open in new tab" right-click behavior.
  return true;
}
</script>
</head>
<body>
<div class="sidebar-pillar">
  <!-- Use target="_blank" for App compatibility and target="_top" as a hint for same-tab in browsers -->
  <a href="https://www.notion.so/322bca1cc0de80e7af17e7a555384e2e" target="_blank" onclick="return handleNav(event, this.href)" class="nav-item">
    <div class="icon-box">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
    </div>

    </div>
    <span class="label">Finance</span>

    </div>

      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"></circle><circle cx="17.5" cy="10.5" r=".5"></circle><circle cx="8.5" cy="7.5" r=".5"></circle><circle cx="6.5" cy="12.5" r=".5"></circle><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.9 0 1.5-.6 1.5-1.5 0-.4-.1-.8-.4-1.1-.3-.3-.4-.7-.4-1.1 0-.9.7-1.5 1.5-1.5H16c3.3 0 6-2.7 6-6 0-5.5-4.5-10-10-10z"></path></svg>

</body>
</html>
